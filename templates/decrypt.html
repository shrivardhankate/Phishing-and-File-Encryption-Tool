{% extends "base.html" %}
{% block content %}

<h2 class="page-title">🔓 Decrypt File</h2>

<div class="form-container">
    <div class="card">

        {% if error %}
        <div style="background: rgba(255,0,0,0.2); color:#ff4d4d; padding:10px; border-radius:8px; margin-bottom:15px; text-align:center;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            <label>Upload Encrypted File (.enc)</label>
            <input type="file" name="file" required>

            <label style="display:block;">Decryption Key</label>
            <input type="text" name="key" placeholder="Paste your key here" required>

            <button type="submit" class="btn" style="margin-top:15px;">Decrypt File</button>
        </form>

        <a href="/home" class="btn" style="margin-top:10px; background: rgba(255,255,255,0.1);">Back to Home</a>
    </div>
</div>

{% endblock %}
