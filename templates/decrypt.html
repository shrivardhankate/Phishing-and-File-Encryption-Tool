{% extends "base.html" %}
{% block content %}
<h2 class="page-title">🔓 Decrypt File</h2>
<div class="form-container">
    <div class="card">
        {% if error %}
        <div style="background:rgba(255,60,60,0.12); color:#ff6b6b; border:1px solid rgba(255,60,60,0.25); border-radius:10px; padding:12px 16px; font-size:14px; margin-bottom:20px;">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" enctype="multipart/form-data">
            <label style="font-size:13px; color:rgba(255,255,255,0.5);">Upload Encrypted File (.enc)</label>
            <input type="file" name="file" accept=".enc" required>
            <label style="font-size:13px; color:rgba(255,255,255,0.5); display:block; margin-top:8px;">Decryption Key</label>
            <input type="text" name="key" placeholder="Paste your Fernet key here" required>
            <button type="submit" class="btn" style="margin-top:8px;">Decrypt File</button>
        </form>
        <a href="/home" class="btn" style="margin-top:10px; display:block; text-align:center; background:rgba(255,255,255,0.08);">Back to Home</a>
    </div>
</div>
{% endblock %}
