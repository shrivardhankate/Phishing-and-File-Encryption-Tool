<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cybershield.css') }}">
</head>
<body>

<div>
    <nav>
        <a class="navbar" href="/">CyberShield</a>

    </nav>
</div>
<div>
    <h2 class="page-title">🔐 Welcome to CyberShield</h2>

    <div class="form-container">
        <div class="card" style="max-width:400px; margin:0 auto;">

            <form method="POST">
                <input style="width: 100%;
                    padding: 12px;
                    margin-top: 10px;
                    margin-bottom: 20px;
                    border-radius: 8px;" type="text" name="username" placeholder="Username" required>
                <input style="width: 100%;
                    padding: 12px;
                    margin-top: 10px;
                    margin-bottom: 20px;
                    border-radius: 8px;" type="password" name="password" placeholder="Password" required>
                <button class="btn" type="submit">Login</button>
            </form>

            <p>Don't have an account? <a href="{{ url_for('register_page') }}">Register</a></p>

        </div>
    </div>
</div>
    
</body>
</html>
