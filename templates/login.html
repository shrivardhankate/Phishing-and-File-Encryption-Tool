<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield – Login</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='cybershield.css') }}">
    <style>
    .auth-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .auth-logo { font-size:28px; font-weight:800; letter-spacing:1px; margin-bottom:32px; }
    .auth-logo span { color:#00c6ff; }
    .auth-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:40px 36px; width:100%; max-width:400px; backdrop-filter:blur(12px); }
    .auth-card h2 { font-size:22px; margin-bottom:24px; text-align:center; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.7px; }
    .field input { width:100%; padding:12px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#fff; font-size:14px; outline:none; transition:0.2s; }
    .field input:focus { border-color:#00c6ff; background:rgba(0,198,255,0.07); }
    .auth-btn { width:100%; padding:13px; margin-top:8px; border-radius:10px; background:linear-gradient(135deg,#00c6ff,#0072ff); color:#fff; border:none; font-weight:700; font-size:15px; cursor:pointer; transition:0.2s; }
    .auth-btn:hover { opacity:0.85; transform:translateY(-1px); }
    .auth-err { background:rgba(255,60,60,0.12); color:#ff6b6b; border:1px solid rgba(255,60,60,0.25); border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
    .auth-link { text-align:center; margin-top:20px; font-size:14px; color:rgba(255,255,255,0.5); }
    .auth-link a { color:#00c6ff; text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-logo">Cyber<span>Shield</span></div>
    <div class="auth-card">
        <h2>🔐 Welcome Back</h2>
        {% if error %}<div class="auth-err">⚠️ {{ error }}</div>{% endif %}
        <form method="POST">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button class="auth-btn" type="submit">Login</button>
        </form>
        <p class="auth-link">No account? <a href="{{ url_for('register_page') }}">Register here</a></p>
    </div>
</div>
</body>
</html>
