<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
.page-title {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    letter-spacing: 1px;
}

.form-container {
    max-width: 500px;
    margin: auto;
}

form input[type="file"],
form input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

form input::placeholder {
    color: #ddd;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    background: #00c6ff;
    border: none;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    background: #0072ff;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.safe {
    background: rgba(0, 255, 100, 0.2);
    color: #00ff88;
}

.suspicious {
    background: rgba(255, 165, 0, 0.2);
    color: orange;
}

.phishing {
    background: rgba(255, 0, 0, 0.2);
    color: #ff4d4d;
}

.form-control {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background-color: rgba(255,255,255,0.15);
    color: white;
}
    </style>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='cybershield.css') }}">
</head>

<body>
<div>
    <nav>
        <a class="navbar" href="/">CyberShield</a>
        <a class="navbar-logout" href="/logout">Logout</a>

    </nav>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    © 2026 CyberShield | Secure. Detect. Protect.
</footer>

</body>
</html>
